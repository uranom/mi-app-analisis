syntax = "proto3";option java_package = "mx.com.superapp.gssaservicecoordinator";option java_multiple_files = true;message AddressStore {  string street         = 1;  string number_ext     = 2;  string number_int     = 3;  string postal_address = 4;  string neighborhood   = 5;  string population     = 6;  string state          = 7;  string country        = 8;  string address        = 9;  string colony         = 10;  string lat            = 11;  string long           = 12;  string type           = 13;}